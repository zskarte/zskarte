name: PR

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize

env:
  NODE_VERSION: '22.14.0'

jobs:
  testAndBuild:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint
