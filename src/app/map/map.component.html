<div style="position: relative; height: 100%; width: 100%">
  <div id="map" class="map"></div>
  <div id="maploader" #maploader>
    <mat-progress-spinner color="primary" mode="indeterminate">
    </mat-progress-spinner>
  </div>
  <!--<div id="mouse-position"></div>-->

  <div class="zoom noprint">
    <button
      mat-icon-button
      (click)="zoomIn()"
      [attr.aria-label]="i18n.get('zoomIn')"
    >
      <mat-icon>zoom_in</mat-icon>
    </button>
    <button
      mat-icon-button
      (click)="zoomOut()"
      [attr.aria-label]="i18n.get('zoomOut')"
    >
      <mat-icon>zoom_out</mat-icon>
    </button>
    <button
      mat-icon-button
      (click)="sharedState.setSidebarContext(SidebarContext.Layers)"
      [color]="
        (sharedState.sidebarContext | async) === SidebarContext.Layers &&
        sidebarOpen
          ? 'primary'
          : 'basic'
      "
      [attr.aria-label]="i18n.get('layers')"
    >
      <mat-icon>layers</mat-icon>
    </button>
    <button
      mat-icon-button
      (click)="sharedState.setSidebarContext(SidebarContext.Filters)"
      [color]="
        (sharedState.sidebarContext | async) === SidebarContext.Filters &&
        sidebarOpen
          ? 'primary'
          : 'basic'
      "
      [attr.aria-label]="i18n.get('filters')"
    >
      <mat-icon>filter_alt</mat-icon>
    </button>

    <button
      mat-icon-button
      *ngIf="sidebarOpen"
      (click)="sharedState.setSidebarContext(sidebarContext)"
      color="accent"
      [attr.aria-label]="i18n.get('close')"
    >
      <mat-icon>close</mat-icon>
    </button>
  </div>
</div>
