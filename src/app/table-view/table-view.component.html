<header>
  <h2>{{i18n.get('table')}}</h2>
  <button mat-icon-button (click)="closeClick()">
    <i class="material-icons">close</i>
  </button>
</header>
<mat-divider></mat-divider>

<div class="filter">
  <mat-form-field appearance="standard">
    <mat-label>{{i18n.get('filter')}}</mat-label>
    <input matInput (keyup)="applyFilter($event)">
  </mat-form-field>
</div>

<mat-divider></mat-divider>
<table mat-table [dataSource]="dataSource" matSort>
  <ng-container matColumnDef="image">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let element">
      <img *ngIf="element.src" [src]="element.src" [alt]="element.type">
    </td>
  </ng-container>
  <ng-container matColumnDef="type">
    <th mat-header-cell *matHeaderCellDef mat-sort-header> {{i18n.get('type')}} </th>
    <td mat-cell *matCellDef="let element"> {{element.type}} </td>
  </ng-container>
  <ng-container matColumnDef="label">
    <th mat-header-cell *matHeaderCellDef mat-sort-header> {{i18n.get('name')}} </th>
    <td mat-cell *matCellDef="let element"> {{element.label}} </td>
  </ng-container>
  <ng-container matColumnDef="coordinates">
    <th mat-header-cell *matHeaderCellDef> {{i18n.get('coordinates')}} </th>

    <td mat-cell *matCellDef="let element">
      <ng-container *ngFor="let coordinate of element.coordinates; let isLast=last">
        {{coordinate | number : '1.0-3'}}{{ isLast ? '' : ', ' }}
      </ng-container>
    </td>
  </ng-container>

  <tr class="mat-row" *matNoDataRow>
    <td class="mat-cell" colspan="4">{{i18n.get('noData')}}</td>
  </tr>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
