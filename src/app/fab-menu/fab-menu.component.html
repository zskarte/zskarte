<div class="fab-menu" [hidden]="historyMode">
  <button
    mat-fab
    color="primary"
    aria-label="Add"
    (click)="isOpen = !isOpen"
    cdkOverlayOrigin
    #trigger="cdkOverlayOrigin"
  >
    <mat-icon class="add-icon" [class.skewed]="isOpen">add</mat-icon>
  </button>
</div>

<div
  class="fab-background"
  [class.isOpen]="isOpen"
  (click)="closeBackdrop()"
></div>

<!-- This template displays the overlay content and is connected to the button -->
<ng-template
  cdkConnectedOverlay
  [cdkConnectedOverlayOrigin]="trigger"
  [cdkConnectedOverlayOpen]="isOpen"
>
  <ul class="fab-menu-list">
    <li>
      <button
        mat-raised-button
        class="mat-fab"
        (click)="openTextDialog()"
        [matTooltip]="i18n.get('text') + ' (ALT+X)'"
        matTooltipPosition="left"
      >
        <mat-icon>font_download</mat-icon>
      </button>
    </li>
    <li>
      <button
        mat-raised-button
        class="mat-fab"
        (click)="polygon()"
        [matTooltip]="i18n.get('polygon') + ' (ALT+P)'"
        matTooltipPosition="left"
      >
        <mat-icon>widgets</mat-icon>
      </button>
    </li>
    <li>
      <button
        mat-raised-button
        class="mat-fab"
        (click)="line()"
        [matTooltip]="i18n.get('line') + ' (ALT+L)'"
        matTooltipPosition="left"
      >
        <mat-icon>show_chart</mat-icon>
      </button>
    </li>
    <li>
      <button
        mat-raised-button
        class="mat-fab"
        (click)="toggleFreeHandDraw()"
        [matTooltip]="i18n.get('freehand') + ' (ALT+O)'"
        matTooltipPosition="left"
      >
        <mat-icon>gesture</mat-icon>
      </button>
    </li>
    <li>
      <button
        mat-raised-button
        class="mat-fab"
        (click)="openDrawDialog()"
        [matTooltip]="i18n.get('symbol') + ' (ALT+S)'"
        matTooltipPosition="left"
      >
        <mat-icon>stars</mat-icon>
      </button>
    </li>
  </ul>
</ng-template>
