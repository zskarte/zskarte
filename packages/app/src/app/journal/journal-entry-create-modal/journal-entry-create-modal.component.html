<app-dialog-header (close)="onClose()" [autoClose]="false">
  <h2>{{ i18n.get('createNewEntry') }}</h2>
</app-dialog-header>
<app-dialog-body>
  <app-journal-form
    [entry]="null"
    (close)="onClose()"
    (dirty)="onDirty($event)"
    [isCreateModal]="true"
  ></app-journal-form>
</app-dialog-body>
<app-dialog-footer>
  <button mat-flat-button color="primary" (click)="onSave()">
    <mat-icon>check</mat-icon>
    {{ i18n.get('create') }}
  </button>
</app-dialog-footer>
