@let context = sidebar.context();
@let showLogo = context && (sidebarConfig[context]?.showLogo ?? true);
@let title = context && (sidebarConfig[context]?.title ?? session.getOperationName());
<aside class="sidebar noprint" [class.open]="sidebar.isOpen()">
  <div class="sidebar-header">
    <div class="credits">
      @if (showLogo && logo) {
        <img [src]="logo" alt="" />
      } @else if (localOperation) {
        <mat-icon>device_hub</mat-icon>
      }
      <h1>{{ title }}</h1>
    </div>
    <button mat-icon-button (click)="sidebar.close()" [attr.aria-label]="i18n.get('close')">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <div class="sidebar-content">
    <router-outlet name="sidebar" />
  </div>
</aside>
