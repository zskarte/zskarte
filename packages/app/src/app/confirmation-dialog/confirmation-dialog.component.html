<app-dialog-header>
  <h2>{{ i18n.get('confirm') }}</h2>
</app-dialog-header>
<app-dialog-body>
  {{ data.message }}
</app-dialog-body>
<app-dialog-footer>
  <button mat-stroked-button (click)="cancel()">{{ data.cancelLabel ?? i18n.get('cancel') }}</button>
  <button
    mat-flat-button
    color="primary"
    cdkFocusInitial
    (click)="ok()"
  >{{ data.confirmLabel ?? i18n.get('confirm') }}</button>
</app-dialog-footer>
