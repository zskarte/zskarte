<div mat-dialog-content>{{ data.message }}</div>
<div mat-dialog-actions align="end">
  <button mat-stroked-button (click)="cancel()">{{ data.cancelLabel ?? i18n.get('cancel') }}</button>
  <button
    mat-flat-button
    color="primary"
    cdkFocusInitial
    (click)="ok()"
  >{{ data.confirmLabel ?? i18n.get('confirm') }}</button>
</div>
