<h2 mat-dialog-title>{{ i18n.get('enterYourName') }}</h2>
<form (submit)="submit($event)">
  <div mat-dialog-content>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ i18n.get('myName') }}</mat-label>
      <input matInput [formControl]="nameControl" maxlength="40" cdkFocusInitial />
    </mat-form-field>
  </div>
  <mat-dialog-actions align="end">
    <button mat-stroked-button type="button" (click)="cancel()">
      {{ i18n.get('cancel') }}
    </button>
    <button mat-flat-button color="primary" type="submit" [disabled]="nameControl.invalid || !nameControl.value?.trim()">
      {{ i18n.get('ok') }}
    </button>
  </mat-dialog-actions>
</form>
